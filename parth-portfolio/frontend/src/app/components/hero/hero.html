<section id="hero" class="hero-section">
  <div #heroBg class="hero-bg-mesh"></div>

  <div class="container hero-container">
    <div #heroContent class="hero-content">
      <h4 class="hero-greeting">Hello, I am</h4>
      <h1 class="hero-title">
        <span class="char">P</span><span class="char">a</span><span class="char">r</span><span
          class="char">t</span><span class="char">h</span> <span class="char">J</span><span class="char">o</span><span
          class="char">s</span><span class="char">h</span><span class="char">i</span>
      </h1>
      <h2 class="hero-subtitle">
        <span class="text-gradient">3d Modeler</span> | Motion Design | Hard Surface Modeling
      </h2>
      <p class="hero-tagline">
        Creative 3D Artist and Software Engineering student with a focus on hard-surface modeling and stylized
        environment design.
      </p>

      <div class="hero-cta">
        <button class="btn btn-primary" (click)="scrollToProjects()">View My Work</button>
        <button class="btn btn-outline" (click)="scrollToAbout()">Learn More</button>
      </div>
    </div>
  </div>

  <!-- Vertical Socials -->
  <div class="social-vertical">
    <a href="https://instagram.com/parth_joshi" target="_blank" class="social-link">
      <lucide-icon [name]="InstagramIcon"></lucide-icon>
    </a>
    <a href="https://linkedin.com/in/parth-joshi-555943245" target="_blank" class="social-link">
      <lucide-icon [name]="LinkedinIcon"></lucide-icon>
    </a>
    <a href="https://parth91006.artstation.com/" target="_blank" class="social-link" title="ArtStation">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
        <path d="M12.7 3.5l6.8 11.5L23.2 15 16 3.5h-3.3zm-6 11.5H.8l3.6-6h6.7l-4.4 6zm4.8 1 2.8 5h6L14 16h-2.5z" />
      </svg>
    </a>
    <a href="mailto:parthjoshi910@gmail.com" class="social-link">
      <lucide-icon [name]="MailIcon"></lucide-icon>
    </a>
    <div class="vertical-line"></div>
  </div>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator" (click)="scrollToAbout()">
    <lucide-icon [name]="ArrowIcon" class="bounce"></lucide-icon>
    <span>Scroll</span>
  </div>
</section>
