<nav [class.scrolled]="isScrolled()" [class.glass]="isScrolled()" class="navbar">
  <div class="container nav-content">
    <div class="logo" (click)="scrollToSection('#hero')">
      <lucide-icon [name]="PointerIcon" class="logo-icon"></lucide-icon>
      <span class="logo-text">PARTH<span class="text-gradient">.JOSHI</span></span>
    </div>

    <!-- Desktop Nav -->
    <ul class="nav-links">
      <li *ngFor="let link of navLinks">
        <a (click)="scrollToSection(link.href)" class="nav-link">{{ link.name }}</a>
      </li>
    </ul>

    <div class="nav-actions">
      <a href="https://parth91006.artstation.com/" target="_blank" class="social-icon" title="ArtStation">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
          <path d="M12.7 3.5l6.8 11.5L23.2 15 16 3.5h-3.3zm-6 11.5H.8l3.6-6h6.7l-4.4 6zm4.8 1 2.8 5h6L14 16h-2.5z" />
        </svg>
      </a>
      <button class="mobile-toggle" (click)="toggleMenu()">
        <lucide-icon [name]="isMenuOpen() ? XIcon : MenuIcon"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMenuOpen()">
    <ul class="mobile-nav-links">
      <li *ngFor="let link of navLinks">
        <a (click)="scrollToSection(link.href)" class="mobile-nav-link">{{ link.name }}</a>
      </li>
    </ul>
  </div>
</nav>
